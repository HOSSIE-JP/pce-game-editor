<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log - MD Game Editor</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    :root {
      --sidebar-w:     64px;
      --top-h:         54px;
      --log-h:         36px;
      --log-h-open:    220px;
      --bg:            #0d1117;
      --surface:       #111820;
      --panel:         #161b22;
      --panel-hover:   #1f2630;
      --border:        #30363d;
      --text:          #c9d1d9;
      --muted:         #8b949e;
      --accent:        #58a6ff;
      --green:         #3fb950;
      --red:           #f85149;
      --yellow:        #d29922;
      --purple:        #bc8cff;
      --sidebar-bg:    #0b0f14;
      --build-bg:      #07090c;
    }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .log-popout-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .log-popout-title {
      margin: 0;
      font: 600 13px/1.2 "Segoe UI", sans-serif;
    }
    .log-popout-count {
      color: var(--muted);
      font: 12px/1.2 "Segoe UI", sans-serif;
    }
    .log-popout-body {
      flex: 1;
      min-height: 0;
      padding: 10px 14px 12px;
      background: var(--build-bg);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .log-popout-body .build-log-toolbar {
      padding-top: 0;
    }
    .log-popout-body .build-log-entries {
      min-height: 0;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header class="log-popout-header">
    <h1 class="log-popout-title">MD Game Editor Log</h1>
    <span class="log-popout-count" id="count">0 lines</span>
  </header>
  <main class="log-popout-body">
    <div class="build-log-toolbar">
      <select id="logLevelFilter" class="log-level-select" title="レベルフィルタ">
        <option value="all">all</option>
        <option value="debug">debug+</option>
        <option value="info">info+</option>
        <option value="warn">warn+</option>
        <option value="error">error</option>
      </select>
      <input id="logSearchInput" class="log-search-input" type="text" placeholder="🔍 ログを検索..." />
    </div>
    <div id="logSourceFilters" class="log-source-filters"></div>
    <div id="log" class="build-log-entries"></div>
  </main>
  <script type="module" src="./log-viewer.js"></script>
</body>
</html>
